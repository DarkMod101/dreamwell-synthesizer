<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dreamwell Synthesizer</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="app">
    <header class="logo">
      <h1>DREAMWELL</h1>
      <p>SYNTHESIZER</p>
      <span>Resonant Doorways</span>
    </header>

    <section class="controls">
      <div class="panel">
        <h2>Oscillator A</h2>

        <label>
          Waveform A
          <select id="waveform">
            <option value="sine">Sine</option>
            <option value="triangle">Triangle</option>
            <option value="sawtooth">Saw</option>
            <option value="square">Square</option>
          </select>
        </label>

        <h2>Oscillator B</h2>

        <label>
          Waveform B
          <select id="waveformB">
            <option value="sine">Sine</option>
            <option value="triangle">Triangle</option>
            <option value="sawtooth" selected>Saw</option>
            <option value="square">Square</option>
          </select>
        </label>

        <label>
          <span>Osc B Level <strong id="oscBLevelValue">35%</strong></span>
          <input id="oscBLevel" type="range" min="0" max="1" step="0.01" value="0.35">
        </label>

        <label>
          <span>Osc B Detune <strong id="oscBDetuneValue">+7 cents</strong></span>
          <input id="oscBDetune" type="range" min="-50" max="50" step="1" value="7">
        </label>
      </div>

      <div class="panel">
        <h2>Envelope</h2>

        <label>
          <span>Attack <strong id="attackValue">0.05 s</strong></span>
          <input id="attack" type="range" min="0.01" max="2" step="0.01" value="0.05">
        </label>

        <label>
          <span>Decay <strong id="decayValue">0.20 s</strong></span>
          <input id="decay" type="range" min="0.01" max="2" step="0.01" value="0.20">
        </label>

        <label>
          <span>Sustain <strong id="sustainValue">70%</strong></span>
          <input id="sustain" type="range" min="0" max="1" step="0.01" value="0.70">
        </label>

        <label>
          <span>Release <strong id="releaseValue">0.50 s</strong></span>
          <input id="release" type="range" min="0.01" max="5" step="0.01" value="0.50">
        </label>
      </div>

      <div class="panel">
        <h2>Filter</h2>

        <label>
          Filter Type
          <select id="filterType">
            <option value="lowpass">Low Pass</option>
            <option value="highpass">High Pass</option>
          </select>
        </label>

        <label>
          <span>Cutoff <strong id="cutoffValue">4000 Hz</strong></span>
          <input id="cutoff" type="range" min="80" max="12000" step="1" value="4000">
        </label>

        <label>
          <span>Resonance <strong id="resonanceValue">Q 1.0</strong></span>
          <input id="resonance" type="range" min="0" max="20" step="0.1" value="1">
        </label>
      </div>

      <div class="panel">
        <h2>Dream Wave</h2>

        <label>
          <span>LFO Rate <strong id="lfoRateValue">2.0 Hz</strong></span>
          <input id="lfoRate" type="range" min="0.1" max="12" step="0.1" value="2">
        </label>

        <label>
          <span>LFO Amount <strong id="lfoAmountValue">0</strong></span>
          <input id="lfoAmount" type="range" min="0" max="3000" step="1" value="0">
        </label>

        <label>
          LFO Destination
          <select id="lfoDestination">
            <option value="filter">Filter Cutoff</option>
            <option value="pitch">Pitch</option>
            <option value="volume">Volume</option>
          </select>
        </label>
      </div>

      <div class="panel">
        <h2>Space</h2>

        <label>
          <span>Reverb Mix <strong id="reverbMixValue">25%</strong></span>
          <input id="reverbMix" type="range" min="0" max="1" step="0.01" value="0.25">
        </label>

        <label>
          <span>Reverb Decay <strong id="reverbDecayValue">3.0 s</strong></span>
          <input id="reverbDecay" type="range" min="0.5" max="8" step="0.1" value="3">
        </label>

        <label>
          <span>Delay Mix <strong id="delayMixValue">55%</strong></span>
          <input id="delayMix" type="range" min="0" max="1" step="0.01" value="0.55">
        </label>

        <label>
          <span>Delay Time <strong id="delayTimeValue">550 ms</strong></span>
          <input id="delayTime" type="range" min="0.05" max="1.5" step="0.01" value="0.55">
        </label>

        <label>
          <span>Feedback <strong id="delayFeedbackValue">55%</strong></span>
          <input id="delayFeedback" type="range" min="0" max="0.85" step="0.01" value="0.55">
        </label>
      </div>

      <div class="panel">
        <h2>Master</h2>

        <label>
          <span>Master Volume <strong id="masterVolumeValue">25%</strong></span>
          <input id="masterVolume" type="range" min="0" max="1" step="0.01" value="0.25">
        </label>
      </div>
    </section>

    <section class="keyboard">
      <button class="key" data-note="261.63">C</button>
      <button class="key" data-note="293.66">D</button>
      <button class="key" data-note="329.63">E</button>
      <button class="key" data-note="349.23">F</button>
      <button class="key" data-note="392.00">G</button>
      <button class="key" data-note="440.00">A</button>
      <button class="key" data-note="493.88">B</button>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dreamwell Synthesizer</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="app">
    <header class="logo">
      <h1>DREAMWELL</h1>
      <p>SYNTHESIZER</p>
      <span>Resonant Doorways</span>
    </header>

<section class="presets">
  <h2>Presets</h2>

  <div class="preset-bank-tabs">
    <button class="bank-btn active-bank" data-bank="signature">Signature</button>
    <button class="bank-btn" data-bank="keys">Keys</button>
    <button class="bank-btn" data-bank="pads">Pads</button>
    <button class="bank-btn" data-bank="leads">Leads</button>
    <button class="bank-btn" data-bank="bass">Bass</button>
    <button class="bank-btn" data-bank="textures">Textures</button>
  </div>

  <div class="preset-grid" id="presetGrid">
    <button class="preset-btn" data-preset="dreamPad">Dream Pad</button>
    <button class="preset-btn" data-preset="theWell">The Well</button>
    <button class="preset-btn" data-preset="abyss">Abyss</button>
    <button class="preset-btn" data-preset="resonantDoorway">Resonant Doorway</button>
    <button class="preset-btn" data-preset="falling">Falling</button>
  </div>

  <button id="openPresetBrowser" class="preset-browser-btn">
  Presets
</button>
  <p id="presetMessage" class="preset-message"></p>
</section>
    
    <section class="controls">
      <div class="panel">
        <h2>Oscillator A</h2>

        <label>
          Waveform A
          <select id="waveform">
            <option value="sine">Sine</option>
            <option value="triangle">Triangle</option>
            <option value="sawtooth">Saw</option>
            <option value="square">Square</option>
            <option value="trapezoid">Trapezoid</option>
          </select>
        </label>

        <h2>Oscillator B</h2>

        <label>
          Waveform B
          <select id="waveformB">
            <option value="sine">Sine</option>
            <option value="triangle">Triangle</option>
            <option value="sawtooth" selected>Saw</option>
            <option value="square">Square</option>
            <option value="trapezoid">Trapezoid</option>
          </select>
        </label>

<label>
  <span>
    Wave Fusion
    <strong id="waveFusionValue">50%</strong>
  </span>
  <input
    id="waveFusion"
    type="range"
    min="0"
    max="100"
    step="1"
    value="50">
</label>

<label>
  <span>Origin</span>
  <select id="origin">
    <option value="pure" selected>Pure</option>
    <option value="vintage">Vintage</option>
    <option value="dream">Dream</option>
    <option value="glass">Glass</option>
    <option value="hollow">Hollow</option>
    <option value="ancient">Ancient</option>
    <option value="cosmic">Cosmic</option>
  </select>
</label>
        
<label>
  <span>Morph Curve</span>
  <select id="waveFusionCurve">
    <option value="linear">Linear</option>
    <option value="smooth" selected>Smooth</option>
    <option value="deep">Deep</option>
    <option value="bright">Bright</option>
  </select>
</label>

<label class="checkbox-row">
  <input type="checkbox" id="dreamMorphMotion">
  Dream Morph Motion
</label>
        
<label>
  <span>Sub Waveform</span>
  <select id="subWaveform">
    <option value="sine">Sine</option>
    <option value="triangle">Triangle</option>
    <option value="square">Square</option>
  </select>
</label>

<label>
  <span>Sub Level <strong id="subLevelValue">0%</strong></span>
  <input
    id="subLevel"
    type="range"
    min="0"
    max="100"
    step="1"
    value="0">
</label>
        
        <label>
          <span>Osc B Level <strong id="oscBLevelValue">35%</strong></span>
          <input id="oscBLevel" type="range" min="0" max="1" step="0.01" value="0.35">
        </label>

        <label>
          <span>Osc B Detune <strong id="oscBDetuneValue">+7 cents</strong></span>
          <input id="oscBDetune" type="range" min="-50" max="50" step="1" value="7">
        </label>

<label>
  <span>Voice Spread <strong id="voiceSpreadValue">0%</strong></span>
  <input id="voiceSpread" type="range" min="0" max="100" step="1" value="0">
</label>

<label>
  <span>Texture Type</span>
  <select id="noiseType">
    <option value="white">White</option>
    <option value="dark">Dark Void</option>
    <option value="air">Air</option>
    <option value="dust">Stardust</option>
    <option value="machine">Ancient Machine</option>
    <option value="cosmic">Cosmic</option>
  </select>
</label>

<label class="checkbox-row">
  <input type="checkbox" id="deepDreamOrbit" checked>
  Deep Dream Orbit
</label>
        
<label>
  <span>Noise Layer <strong id="noiseAmountValue">0%</strong></span>
  <input
    id="noiseAmount"
    type="range"
    min="0"
    max="100"
    step="1"
    value="0">
</label>
        
        
<label>
 <span>Drift <strong id="driftValue">0</strong></span>
<input id="drift" type="range" min="0" max="100" step="1" value="0">
</label>

<label>
  <span>Stereo Width <strong id="stereoWidthValue">0%</strong></span>
  <input id="stereoWidth" type="range" min="0" max="100" step="1" value="0">
</label>
        
      </div>

      <div class="panel">
        <h2>Envelope</h2>

        <label>
          <span>Attack <strong id="attackValue">0.05 s</strong></span>
          <input id="attack" type="range" min="0.01" max="2" step="0.01" value="0.05">
        </label>

        <label>
          <span>Decay <strong id="decayValue">0.20 s</strong></span>
          <input id="decay" type="range" min="0.01" max="2" step="0.01" value="0.20">
        </label>

        <label>
          <span>Sustain <strong id="sustainValue">70%</strong></span>
          <input id="sustain" type="range" min="0" max="1" step="0.01" value="0.70">
        </label>

        <label>
          <span>Release <strong id="releaseValue">0.50 s</strong></span>
          <input id="release" type="range" min="0.01" max="5" step="0.01" value="0.50">
        </label>
      </div>

      <div class="panel">
        <h2>Filter</h2>

        <label>
          Filter Type
          <select id="filterType">
            <option value="lowpass">Low Pass</option>
            <option value="highpass">High Pass</option>
          </select>
        </label>

        <label>
          <span>Cutoff <strong id="cutoffValue">4000 Hz</strong></span>
          <input id="cutoff" type="range" min="80" max="12000" step="1" value="4000">
        </label>

        <label>
          <span>Resonance <strong id="resonanceValue">Q 1.0</strong></span>
          <input id="resonance" type="range" min="0" max="20" step="0.1" value="1">
        </label>
      </div>

      <div class="panel">
        <h2>Dream Wave</h2>

        <label>
          <span>LFO Rate <strong id="lfoRateValue">2.0 Hz</strong></span>
          <input id="lfoRate" type="range" min="0.1" max="12" step="0.1" value="2">
        </label>

        <label>
          <span>LFO Amount <strong id="lfoAmountValue">0</strong></span>
          <input id="lfoAmount" type="range" min="0" max="3000" step="1" value="0">
        </label>

        <label>
          LFO Destination
          <select id="lfoDestination">
            <option value="filter">Filter Cutoff</option>
            <option value="pitch">Pitch</option>
            <option value="volume">Volume</option>
          </select>
        </label>

      </div>

      <div class="panel">
        <h2>Space</h2>

        <label>
          <span>Reverb Mix <strong id="reverbMixValue">25%</strong></span>
          <input id="reverbMix" type="range" min="0" max="1" step="0.01" value="0.25">
        </label>

        <label>
          <span>Reverb Decay <strong id="reverbDecayValue">3.0 s</strong></span>
          <input id="reverbDecay" type="range" min="0.5" max="8" step="0.1" value="3">
        </label>

        <label>
          <span>Delay Mix <strong id="delayMixValue">55%</strong></span>
          <input id="delayMix" type="range" min="0" max="1" step="0.01" value="0.55">
        </label>

        <label>
          <span>Delay Time <strong id="delayTimeValue">550 ms</strong></span>
          <input id="delayTime" type="range" min="0.05" max="1.5" step="0.01" value="0.55">
        </label>

        <label>
          <span>Feedback <strong id="delayFeedbackValue">55%</strong></span>
          <input id="delayFeedback" type="range" min="0" max="0.85" step="0.01" value="0.55">
        </label>
      </div>

<div class="panel">
  <h2>Dream Arpeggiator</h2>

  <label class="checkbox-row">
    <input type="checkbox" id="dreamArpEnabled">
    Dream Arpeggiator
  </label>

<label class="checkbox-row">
  <input type="checkbox" id="arpLatch">
  Latch
</label>
  
  <label>
    <span>Rate <strong id="arpRateValue">1/8</strong></span>
    <input
      id="arpRate"
      type="range"
      min="1"
      max="4"
      step="1"
      value="2">
  </label>

<label>
  <span>Gate <strong id="arpGateValue">70%</strong></span>
  <input
    id="arpGate"
    type="range"
    min="10"
    max="100"
    step="1"
    value="70">
</label>
  
  <label>
    Mode
    <select id="arpMode">
  <option value="up" selected>Up</option>
  <option value="down">Down</option>
  <option value="updown">Up / Down</option>
  <option value="random">Random</option>
  <option value="asPlayed">As Played</option>
</select>
  </label>
</div>
      
      <div class="panel">
        <h2>Master</h2>

<label class="checkbox-row">
  <input type="checkbox" id="glideEnabled">
  Portamento / Glide
</label>

<label>
  <span>Glide Time <strong id="glideTimeValue">0.12s</strong></span>
  <input
    id="glideTime"
    type="range"
    min="0.01"
    max="1.5"
    step="0.01"
    value="0.12">
</label>
        
        <label>
          <span>Master Volume <strong id="masterVolumeValue">25%</strong></span>
          <input id="masterVolume" type="range" min="0" max="1" step="0.01" value="0.25">
        </label>

<label>
    <span>Presence <strong id="presenceValue">0%</strong></span>
    <input
        id="presence"
        type="range"
        min="0"
        max="100"
        step="1"
        value="0">
</label>
</div>
</section>
    
<section class="octave-controls">
  <button id="octaveDown" class="octave-btn">◀ OCT</button>

  <span id="octaveDisplay">
    Shift: 0
  </span>

  <button id="octaveUp" class="octave-btn">OCT ▶</button>
</section>
    
    <section class="keyboard">

  <!-- Octave 3 -->
  <button class="key" data-note="130.81">C3</button>
  <button class="key black-key" data-note="138.59">C#3</button>
  <button class="key" data-note="146.83">D3</button>
  <button class="key black-key" data-note="155.56">D#3</button>
  <button class="key" data-note="164.81">E3</button>
  <button class="key" data-note="174.61">F3</button>
  <button class="key black-key" data-note="185.00">F#3</button>
  <button class="key" data-note="196.00">G3</button>
  <button class="key black-key" data-note="207.65">G#3</button>
  <button class="key" data-note="220.00">A3</button>
  <button class="key black-key" data-note="233.08">A#3</button>
  <button class="key" data-note="246.94">B3</button>

  <!-- Octave 4 -->
  <button class="key" data-note="261.63">C4</button>
  <button class="key black-key" data-note="277.18">C#4</button>
  <button class="key" data-note="293.66">D4</button>
  <button class="key black-key" data-note="311.13">D#4</button>
  <button class="key" data-note="329.63">E4</button>
  <button class="key" data-note="349.23">F4</button>
  <button class="key black-key" data-note="369.99">F#4</button>
  <button class="key" data-note="392.00">G4</button>
  <button class="key black-key" data-note="415.30">G#4</button>
  <button class="key" data-note="440.00">A4</button>
  <button class="key black-key" data-note="466.16">A#4</button>
  <button class="key" data-note="493.88">B4</button>

  <!-- Octave 5 -->
  <button class="key" data-note="523.25">C5</button>
  <button class="key black-key" data-note="554.37">C#5</button>
  <button class="key" data-note="587.33">D5</button>
  <button class="key black-key" data-note="622.25">D#5</button>
  <button class="key" data-note="659.25">E5</button>
  <button class="key" data-note="698.46">F5</button>
  <button class="key black-key" data-note="739.99">F#5</button>
  <button class="key" data-note="783.99">G5</button>
  <button class="key black-key" data-note="830.61">G#5</button>
  <button class="key" data-note="880.00">A5</button>
  <button class="key black-key" data-note="932.33">A#5</button>
  <button class="key" data-note="987.77">B5</button>

</section>
  </main>

<div id="presetBrowserOverlay" class="preset-browser-overlay hidden">
  <div class="preset-browser">
    <div class="preset-browser-header">
      <h2>Presets</h2>
      <button id="closePresetBrowser" class="preset-browser-close">×</button>
    </div>

    <div class="preset-browser-tabs">
      <button class="preset-browser-tab active-bank" data-bank="signature">Signature</button>
      <button class="preset-browser-tab" data-bank="keys">Keys</button>
      <button class="preset-browser-tab" data-bank="pads">Pads</button>
      <button class="preset-browser-tab" data-bank="leads">Leads</button>
      <button class="preset-browser-tab" data-bank="bass">Bass</button>
      <button class="preset-browser-tab" data-bank="textures">Textures</button>
    </div>

    <div id="presetBrowserList" class="preset-browser-list"></div>
  </div>
</div>

  <script src="app.js"></script>
  </body>
</html>
